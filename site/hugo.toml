baseURL = "https://www.chaco.dev/"
languageCode = "en-us"
title = "Chaco Central"
enableRobotsTXT = true
publishDir = "public"

[frontmatter]
  # Ensure pages without explicit tags still have an empty list so
  # theme templates that iterate over .Params.tags do not fail.
  [[frontmatter.defaults]]
    [frontmatter.defaults.values]
      tags = []

[module]
  [[module.imports]]
    path = "github.com/gurusabarish/hugo-profile"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  title = "Chaco Central"
  description = "Personal portfolio + technical blog: homelab, Docker, networks, and projects."
  favicon = "/images/fav.png"
  animate = true
  customCSS = true

  [params.theme]
    disableThemeToggle = true
    defaultTheme = "dark"

  [params.navbar]
    align = "ms-auto"
    brandName = "Chaco Central"
    disableSearch = true
    showBrandLogo = true
    [params.navbar.stickyNavBar]
      enable = true
      showOnScrollUp = true
    enableSeparator = false
    [params.navbar.menus]
      disableAbout = true
      # Disable default Experience item so we can control order via menu.main
      disableExperience = true
      disableEducation = true
      disableProjects = true
      disableAchievements = true
      disableContact = true

  [params.hero]
    enable = true
    intro = "Hi, I'm"
    title = "Chase Osborne."
    subtitle = "IT Support Professional"
    content = "IT support professional with 4+ years of hands-on experience resolving end-user issues, managing Active Directory, and administering Microsoft 365 in hybrid environments. Known for finding efficient, lasting solutions and automating repetitive tasks wherever possible."
    image = "/images/headshot.jpg"
    [params.hero.bottomImage]
      enable = true
    [params.hero.button]
      enable = true
      name = "Resume"
      url = "/resume/Chase_O_Resume.pdf"
      download = true
      newPage = false
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-github"
      url = "https://github.com/chaco-win"
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-linkedin"
      url = "https://www.linkedin.com/in/chase-osborne-5a5a4120a/"
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fas fa-envelope"
      url = "mailto:chaseo-work@protonmail.com"

  [params.about]
    enable = true
    title = "About / Resume"
    image = "/images/headshot.jpg"
    content = """
IT support professional with 4+ years of hands-on experience resolving end-user issues, managing Active Directory, and administering Microsoft 365 in hybrid environments. Known for staying calm under pressure and finding efficient, lasting solutions rather than quick fixes. Comfortable supporting users at all technical levels, with a habit of improving processes and automating repetitive tasks wherever possible.
"""
    [params.about.skills]
      enable = true
      title = "Core skills:"
      items = [
        "Active Directory",
        "Microsoft 365",
        "Azure AD",
        "Freshdesk / Ticketing",
        "Windows Imaging & Deployment",
        "Hardware Repair & Maintenance",
        "Network Administration & VLANs",
        "Docker/Containerization",
        "Linux Administration",
        "Backup & Disaster Recovery",
        "VBA & Excel Automation",
        "TeamViewer & RDP"
      ]

  [params.projects]
    enable = true
    # Front Page Projects (exactly these three)
    [[params.projects.items]]
      title = "Homelab Infrastructure"
      content = """
      Home server and network stack: Ubuntu host with ZFS mirror (snapshots, send/receive), Pi-hole + Unbound, PiKVM, and an OPNsense router with VLAN segmentation. Automated backups and Cloudflare Tunnel provide safe remote access.
      """
      image = "/images/projects/homelab.svg"
      url = "/projects/homelab-infrastructure/"
      [[params.projects.items.links]]
        icon = "fas fa-link"
        url = "/projects/homelab-infrastructure/"

    [[params.projects.items]]
      title = "FAB Events Calendar"
      content = """
      Dockerized Python service that scrapes Flesh and Blood TCG events, normalizes data, publishes Google Calendar and iCal feeds, and posts Discord notifications. Includes a scheduled health-check to verify successful runs.
      """
      image = "/images/projects/fab-events.svg"
      url = "/projects/fab-events-calendar/"
      [[params.projects.items.links]]
        icon = "fas fa-link"
        url = "/projects/fab-events-calendar/"

    [[params.projects.items]]
      title = "IT Specialist Toolbox"
      content = """
      PowerShell utilities for Windows Server and Active Directory: password generation/rotation, AD cleanup and reporting, diagnostics, and deployment scripts. Backed by public repositories and usage notes.
      """
      image = "/images/projects/password-tool.svg"
      url = "/projects/it-specialist-toolbox/"
      [[params.projects.items.links]]
        icon = "fas fa-link"
        url = "/projects/it-specialist-toolbox/"

    [[params.projects.items]]
      title = "TCG Resale & Automation"
      content = """
      Independent trading card resale business with custom VBA tooling in Excel: market-based dynamic repricing, excess stock tracking, staple floor overrides, and inventory management — all automated and running without manual calculation.
      """
      image = "/images/projects/password-tool.svg"
      url = "/projects/tcg-resale/"
      [[params.projects.items.links]]
        icon = "fas fa-link"
        url = "/projects/tcg-resale/"

[params.achievements]
  enable = true
  title = "Certifications"

  [[params.achievements.items]]
    title = "CompTIA Security+"
    content = "Core security certification"
    url = "https://www.credly.com/badges/e2998bfa-0daa-49a3-8139-d894c0bb11a0"
    image = "/images/Security+-png.png"

  [[params.achievements.items]]
    title = "CompTIA Network+"
    content = "Networking fundamentals and troubleshooting"
    url = "https://www.credly.com/badges/9a9efe12-d442-47c5-ad46-e8831bbce715"
    image = "/images/Network+-png.png"

  [[params.achievements.items]]
    title = "CompTIA A+"
    content = "Entry-level IT support"
    url = "https://www.credly.com/badges/bca47ce0-3102-4b96-9256-230ac86bb3bb/linked_in_profile"
    image = "/images/A+-png.png"

  [params.footer.socialNetworks]
    github = "https://github.com/chaco-win"
    linkedin = "https://www.linkedin.com/in/chase-osborne-5a5a4120a/"

[params.experience]
  enable = true

  [[params.experience.items]]
    job = "Home Lab & Personal Projects"
    company = "Self-directed"
    date = "Jul 2025 – Present"
    content = """
- Built and maintain a Linux home server with mirrored ZFS storage, automated backups, and Docker Compose-based self-hosted services exposed securely via Cloudflare Tunnel.
- Configured a custom OPNsense router with VLAN segmentation, per-VLAN firewall rules, and Pi-hole DNS filtering.
- Built an automated Python scraper that collects and publishes live event data to a public calendar and Discord, running unattended with health monitoring.
"""

  [[params.experience.items]]
    job = "IT Support Specialist II"
    company = "Sovereign Pharmaceuticals"
    date = "Sep 2023 – Jul 2025, Fort Worth, TX"
    content = """
- Administered Active Directory and Microsoft 365, managing user accounts, groups, permissions, and email distribution lists.
- Diagnosed and resolved Tier 1–2 issues including VPN, printing, and Outlook via Freshdesk, often self-researching unfamiliar software to find solutions.
- Performed hardware repairs and maintenance including screen swaps, memory upgrades, and drive cloning to extend equipment life on a limited budget.
- Built and deployed Windows images via bootable USB, standardizing workstation setup across the environment.
- Onboarded and mentored a junior IT hire across all daily support workflows.
"""

  [[params.experience.items]]
    job = "IT Support Specialist"
    company = "Sovereign Pharmaceuticals"
    date = "Feb 2022 – Sep 2023, Fort Worth, TX"
    content = """
- Resolved Tier 1 help desk tickets covering common hardware, software, and account issues using Freshdesk.
- Assisted with PC deployments, user onboarding, and basic Microsoft 365 and Active Directory tasks.
- Collaborated with senior staff on escalations, building technical knowledge.
"""

  [[params.experience.items]]
    job = "Account Support Specialist"
    company = "PRA Group"
    date = "Aug 2021 – Feb 2022, North Richland Hills, TX"
    content = """
- Provided account support and issue resolution for incoming client inquiries, maintaining accuracy, professionalism, and consistent service quality across high-volume interactions.
"""

  [[params.experience.items]]
    job = "Various Roles – Team Lead, Trainer, Sales"
    company = "Walmart & 7-Eleven"
    date = "Jun 2018 – Aug 2021, Multiple Locations"
    content = """
- Progressed through team lead and trainer roles across retail environments, handling customer service, cash management, inventory, and staff training.
"""

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10

  [[menu.main]]
    name = "Experience"
    url = "/#experience"
    weight = 20

  [[menu.main]]
    name = "Projects"
    url = "/#projects"
    weight = 30

  [[menu.main]]
    name = "Blog"
    url = "/blogs/"
    weight = 40

